
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<title>متجر</title>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-white shadow-sm mb-3">
  <div class="container">
    <a class="navbar-brand" href="/">🛒 المتجر</a>
    <div class="d-flex gap-2">
      <a href="/cart" class="btn btn-outline-primary">السلة ({{ cart_count or 0 }})</a>
      <a href="/chat" class="btn btn-outline-secondary">💬</a>
      {% if session.get('user_id') %}
        <a href="/my_orders" class="btn btn-outline-success">طلباتي</a>
        <a href="/logout" class="btn btn-outline-danger">خروج</a>
      {% else %}
        <a href="/login" class="btn btn-outline-primary">دخول</a>
        <a href="/register" class="btn btn-primary">تسجيل</a>
      {% endif %}
    </div>
  </div>
</nav>
<div class="container">
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="alert alert-info">
        {% for m in messages %}<div>{{ m }}</div>{% endfor %}
      </div>
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
