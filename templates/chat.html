
{% extends 'base.html' %}
{% block content %}
<h3>💬 الشات</h3>
<div id="box" class="border rounded p-2 mb-2" style="height:300px;overflow:auto;background:#fff"></div>
<div class="d-flex gap-2">
  <input id="msg" class="form-control" placeholder="اكتب رسالتك">
  <button class="btn btn-primary" onclick="send()">إرسال</button>
</div>
<script>
function send(){
  const input = document.getElementById('msg');
  const msg = input.value;
  if(!msg) return;
  fetch('/chat', {
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:'message=' + encodeURIComponent(msg)
  })
  .then(r=>r.json())
  .then(d=>{
    const box = document.getElementById('box');
    box.innerHTML += `<div><b>أنت:</b> ${msg}</div>`;
    box.innerHTML += `<div><b>🤖:</b> ${d.response}</div>`;
    box.scrollTop = box.scrollHeight;
    input.value='';
  });
}
</script>
{% endblock %}
