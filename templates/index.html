
{% extends 'base.html' %}
{% block content %}
<h3 class="mb-3">المنتجات</h3>
<div class="row">
{% for p in products %}
  <div class="col-md-3">
    <div class="card mb-3 shadow-sm">
      <img src="{{ p.image }}" class="card-img-top" style="height:160px;object-fit:cover;">
      <div class="card-body">
        <h6 class="card-title">{{ p.name }}</h6>
        <div class="d-flex justify-content-between align-items-center">
          <span class="text-muted">${{ '%.2f'|format(p.price) }}</span>
          <a href="/add_to_cart/{{ p.id }}" class="btn btn-sm btn-primary">أضف للسلة</a>
        </div>
      </div>
    </div>
  </div>
{% endfor %}
</div>
{% endblock %}
