
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
<h3>🧑‍💼 لوحة التحكم</h3>
<table class="table table-bordered">
<tr><th>ID</th><th>المستخدم</th><th>الإجمالي</th><th>الحالة</th><th>تعديل</th></tr>
{% for o in orders %}
<tr>
<td>{{o.id}}</td>
<td>{{o.user_id}}</td>
<td>{{ '%.2f'|format(o.total) }}</td>
<td>{{o.status}}</td>
<td>
<form method='POST' action='/update/{{o.id}}'>
<select name='status' class="form-select">
<option>New</option>
<option>Processing</option>
<option>Done</option>
</select>
<button class="btn btn-sm btn-primary mt-1">Update</button>
</form>
</td>
</tr>
{% endfor %}
</table>
</div>
</body>
</html>
